      --shadow-deep: rgba(60,45,15,0.18);

    }
    .bg-glow {
      position: fixed; top: -40%; left: -20%; width: 70%; height: 70%;
      background: radial-gradient(ellipse at center, rgba(var(--accent-rgb),0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── LOGIN ── */
    #login-screen {
      position: fixed; inset: 0; z-index: 200;
      background: radial-gradient(circle at 50% 30%, var(--gold-bg) 0%, var(--bg-base) 65%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .login-logo { text-align: center; margin-bottom: 2.5rem; }
    .monogram { width: 64px; height: 64px; border-radius: 50%; border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; }
    .monogram i { font-size: 26px; color: var(--gold); }
    .login-logo h1 { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 500; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; }
    .login-logo p { font-size: 9px; color: var(--text-muted); letter-spacing: 4px; text-transform: uppercase; margin-top: 8px; }
    .login-card { width: 360px; border: 0.5px solid var(--border-mid); border-top: 2px solid var(--gold); background: var(--bg-surface); border-radius: 4px; padding: 2.25rem 2.25rem 2rem; box-shadow: 0 8px 40px var(--shadow-deep); }
    .login-divider { display: flex; align-items: center; gap: 14px; margin-bottom: 2rem; }
    .login-divider span { font-size: 9px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; white-space: nowrap; }
    .login-divider::before, .login-divider::after { content: ''; flex: 1; height: 0.5px; background: var(--gold); opacity: 0.3; }
    .lux-field { margin-bottom: 1.4rem; }
    .lux-label { display: block; font-size: 9px; letter-spacing: 2.5px; color: var(--gold); text-transform: uppercase; margin-bottom: 9px; }
    .lux-input { width: 100%; padding: 11px 14px; background: var(--bg-base); border: 0.5px solid var(--border-mid); color: var(--text-primary); font-size: 13px; font-family: 'Inter', sans-serif; outline: none; border-radius: 2px; transition: border-color 0.2s; letter-spacing: 0.5px; }
    .lux-input:focus { border-color: var(--gold); }
    .lux-input::placeholder { color: var(--text-dim); }
    .login-btn { width: 100%; margin-top: 0.75rem; padding: 13px; background: var(--gold); border: none; cursor: pointer; color: #fff; font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; border-radius: 2px; transition: background 0.2s, transform 0.1s; }
    .login-btn:hover { background: var(--gold-light); }
    .login-btn:active { transform: scale(0.99); }
    .login-error { font-size: 11px; color: var(--danger); text-align: center; margin-top: 0.85rem; min-height: 16px; letter-spacing: 0.5px; }
    .login-footer { text-align: center; margin-top: 2rem; font-size: 9px; color: var(--text-dim); letter-spacing: 2.5px; text-transform: uppercase; }

    /* ── MAIN DASH ── */
    #main-dash { display: none; height: 100vh; flex-direction: column; background: transparent; position: relative; z-index: 1; }

    /* ── HEADER ── */
    .dash-header { background: var(--bg-surface); border-bottom: 1px solid var(--border); padding: 0 1.75rem; display: flex; align-items: center; gap: 12px; height: 62px; flex-shrink: 0; box-shadow: 0 1px 8px var(--shadow-soft); backdrop-filter: blur(12px); position: relative; }
    .dash-header::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0.4; }
    .header-brand { flex: 1; display: flex; align-items: center; gap: 11px; }
    .brand-mark { width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 0 1px var(--border-mid), 0 4px 14px rgba(var(--accent-rgb),0.30); }
    .brand-mark i { font-size: 15px; color: #fff; }
    .brand-name { font-family: 'Space Grotesk', sans-serif; font-size: 19px; font-weight: 700; letter-spacing: 0.2px; background: linear-gradient(90deg, var(--text-primary), var(--gold)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .brand-sub { font-family: 'JetBrains Mono', monospace; font-size: 8px; color: var(--text-dim); letter-spacing: 2.5px; text-transform: uppercase; margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .header-time { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #722F37; letter-spacing: 1px; opacity: 0.9; padding: 6px 12px; border: 1px solid rgba(114,47,55,0.35); border-radius: 6px; background: rgba(114,47,55,0.08); font-variant-numeric: tabular-nums; }

    .theme-toggle { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border); background: var(--gold-bg); color: var(--gold); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
    .theme-toggle:hover { border-color: var(--gold); transform: rotate(8deg); }
    .theme-toggle i { font-size: 16px; }

    .header-btn { display: flex; align-items: center; gap: 7px; padding: 7px 14px; background: var(--gold-bg); border: 1px solid var(--border); border-radius: 7px; cursor: pointer; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; transition: all 0.2s; white-space: nowrap; }
    .header-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-bg); }
    .header-btn i { font-size: 15px; }
    .back-btn { display: none; }
    .back-btn.visible { display: flex; }

    .logout-btn { padding: 8px 14px; border: 0.5px solid var(--border-mid); background: transparent; color: var(--text-muted); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border-radius: 2px; font-family: 'Inter', sans-serif; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
    .logout-btn:hover { border-color: var(--danger); color: var(--danger); }


    /* ── CARDS VIEW ── */
    #cards-view { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 28px; padding: 48px 20px; overflow: auto; }

    .cards-title { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 400; color: var(--text-muted); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 4px; text-align: center; }
    .cards-sub { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; text-align: center; margin-bottom: 8px; }

    .cards-grid { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; max-width: 1100px; }

    .dash-card {
      width: 260px; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px 24px; cursor: pointer;
      transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1); box-shadow: 0 4px 20px var(--shadow-soft);
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      position: relative; overflow: hidden;
    }
    .dash-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--gold-bg) 0%, transparent 60%); pointer-events: none; opacity: 0; transition: opacity 0.3s; }
    .dash-card:hover::before { opacity: 1; }
    .dash-card:hover { border-color: var(--border-mid); box-shadow: 0 8px 40px rgba(var(--accent-rgb),0.12), 0 0 0 1px rgba(var(--accent-rgb),0.15); transform: translateY(-6px); }
    .dash-card:active { transform: translateY(-2px); }

    .dash-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0; }

    .card-icon-wrap { width: 56px; height: 56px; border-radius: 14px; background: linear-gradient(135deg, rgba(var(--accent-rgb),0.1), rgba(var(--gold-light-rgb),0.1)); border: 1px solid var(--border-mid); display: flex; align-items: center; justify-content: center; }
    .card-icon-wrap i { font-size: 24px; color: var(--gold); }

    .card-name { font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600; letter-spacing: 0.2px; text-align: center; background: linear-gradient(135deg, var(--text-primary) 30%, var(--gold)); -webkit-background-clip: text; background-clip: text; color: transparent; position: relative; }

    .card-status { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; padding: 5px 14px 5px 10px; border-radius: 20px; display: inline-flex; align-items: center; gap: 6px; }
    .card-status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .card-status.ready { color: #722F37; background: rgba(114,47,55,0.08); border: 1px solid rgba(114,47,55,0.35); }
    .card-status.ready::before { background: #722F37; box-shadow: 0 0 6px #722F37; }
    .card-status.not-set { color: #9c6b71; background: rgba(114,47,55,0.05); border: 1px solid rgba(114,47,55,0.2); }
    .card-status.not-set::before { background: #9c6b71; }

    .card-arrow { color: var(--gold); opacity: 0; transition: all 0.2s; font-size: 16px; }
    .dash-card:hover .card-arrow { opacity: 1; transform: translateX(4px); }

    .add-card {
      width: 260px; min-height: 184px; border-radius: 16px; cursor: pointer;
      border: 1.5px dashed var(--border-mid); background: transparent;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
      color: var(--text-dim); transition: all 0.2s; font-family: 'JetBrains Mono', monospace;
    }
    .add-card:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-bg); }
    .add-card i { font-size: 28px; }
    .add-card span { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }

    /* ── FRAME VIEW ── */
    #frame-view { flex: 1; display: none; flex-direction: column; overflow: hidden; }
    #frame-view.visible { display: flex; }

    .frame-topbar { display: flex; align-items: center; gap: 10px; padding: 10px 1.75rem; background: var(--bg-surface); border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
    .frame-dots { display: flex; gap: 6px; }
    .frame-dots span { width: 9px; height: 9px; border-radius: 50%; }
    .d1 { background: var(--border-mid); } .d2 { background: var(--border); } .d3 { background: var(--gold); opacity: 0.6; }
    .active-label { font-size: 10px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; font-weight: 500; }
    .frame-url-disp { flex: 1; font-size: 10px; color: var(--text-dim); letter-spacing: 0.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .open-ext-btn { padding: 5px 12px; border: 0.5px solid var(--border-mid); background: transparent; color: var(--text-muted); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; border-radius: 2px; font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 5px; transition: all 0.2s; }
    .open-ext-btn:hover { border-color: var(--gold); color: var(--gold); }

    .frame-content { flex: 1; position: relative; }
    .frame-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; background: var(--bg-base); }
    .placeholder-ornament { font-family: 'Space Grotesk', sans-serif; font-size: 64px; color: var(--gold); opacity: 0.12; line-height: 1; }
    .frame-placeholder p { font-size: 10px; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; }
    .frame-placeholder small { font-size: 9px; color: var(--text-dim); letter-spacing: 1.5px; opacity: 0.7; }
    .ph-hint { display: flex; align-items: center; gap: 7px; margin-top: 4px; padding: 7px 14px; border: 0.5px solid var(--border-mid); border-radius: 2px; font-size: 9px; color: var(--text-muted); letter-spacing: 1.5px; cursor: pointer; transition: all 0.2s; }
    .ph-hint:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-bg); }
    .ph-hint i { font-size: 13px; }

    #main-iframe { width: 100%; height: 100%; border: none; display: none; position: absolute; inset: 0; background: #fff; }

    /* ── MANAGE MODAL ── */
    .modal-overlay { display: none; position: fixed; inset: 0; z-index: 300; background: var(--shadow-deep); align-items: center; justify-content: center; padding: 24px; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: var(--bg-surface); border: 0.5px solid var(--border-mid); border-top: 2px solid var(--gold); border-radius: 4px; width: 680px; max-width: 95vw; max-height: 88vh; box-shadow: 0 16px 60px var(--shadow-deep); display: flex; flex-direction: column; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1.4rem 1.75rem; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
    .modal-title-wrap { display: flex; align-items: center; gap: 10px; }
    .modal-title-wrap i { font-size: 18px; color: var(--gold); }
    .modal-title { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 500; color: var(--gold); letter-spacing: 1.5px; }
    .modal-subtitle { font-size: 9px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
    .modal-close { width: 32px; height: 32px; border-radius: 2px; background: transparent; border: 0.5px solid var(--border-mid); cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.2s; flex-shrink: 0; }
    .modal-close:hover { border-color: var(--danger); color: var(--danger); }
    .modal-body { padding: 1.5rem 1.75rem; overflow-y: auto; flex: 1; }

    .manage-row { display: grid; grid-template-columns: 78px 1fr 1fr 34px; gap: 10px; align-items: center; padding: 12px 0; border-bottom: 0.5px solid var(--border); }
    .manage-row:last-child { border-bottom: none; }
    .manage-row select, .manage-row input { width: 100%; padding: 9px 10px; background: var(--bg-base); border: 0.5px solid var(--border-mid); color: var(--text-primary); font-size: 12px; font-family: 'Inter', sans-serif; outline: none; border-radius: 2px; transition: border-color 0.2s; letter-spacing: 0.2px; }
    .manage-row select:focus, .manage-row input:focus { border-color: var(--gold); }
    .manage-row input::placeholder { color: var(--text-dim); }
    .manage-row-delete { width: 32px; height: 32px; border-radius: 2px; border: 0.5px solid var(--border-mid); background: transparent; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .manage-row-delete:hover { border-color: var(--danger); color: var(--danger); background: rgba(178,58,51,0.08); }
    .manage-labels { display: grid; grid-template-columns: 78px 1fr 1fr 34px; gap: 10px; padding-bottom: 8px; }
    .manage-labels span { font-size: 9px; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; }

    .manage-add-row { margin-top: 1rem; width: 100%; padding: 12px; border: 1.5px dashed var(--border-mid); background: transparent; color: var(--text-muted); font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .manage-add-row:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-bg); }

    .modal-footer { padding: 1.25rem 1.75rem; border-top: 0.5px solid var(--border); display: flex; align-items: center; gap: 10px; justify-content: space-between; background: var(--bg-base); border-radius: 0 0 4px 4px; flex-shrink: 0; }
    .modal-footer-note { font-size: 9px; color: var(--text-dim); letter-spacing: 0.5px; }
    .modal-footer-actions { display: flex; gap: 10px; }
    .modal-cancel { padding: 10px 20px; border: 0.5px solid var(--border-mid); background: transparent; color: var(--text-muted); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border-radius: 2px; font-family: 'Inter', sans-serif; transition: all 0.2s; }
    .modal-cancel:hover { border-color: var(--text-muted); color: var(--text-primary); }
    .modal-save { padding: 10px 24px; background: var(--gold); border: none; cursor: pointer; color: #fff; font-family: 'Inter', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; border-radius: 2px; transition: background 0.2s; }
    .modal-save:hover { background: var(--gold-light); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }

    @media (max-width: 560px) {
      .manage-row, .manage-labels { grid-template-columns: 64px 1fr 34px; }
      .manage-row input:nth-of-type(2), .manage-labels span:nth-of-type(3) { display: none; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div id="main-dash">
    <div class="dash-header">
      <div class="header-brand">
        <div class="brand-mark"><i class="ti ti-diamond"></i></div>
        <div>
          <div class="brand-name">Master Dashboard</div>
          <div class="brand-sub">All Dashboards · One Place</div>
        </div>
      </div>
      <div class="header-right">
        <span class="header-time" id="clock"></span>
        <button class="theme-toggle" id="theme-toggle-main" onclick="toggleTheme()" title="Toggle theme">
          <i class="ti ti-sun" id="theme-icon-main"></i>
        </button>
        <button class="header-btn back-btn" id="back-btn" onclick="goBack()">
          <i class="ti ti-arrow-left"></i> Dashboards
        </button>
        <button class="header-btn" onclick="openManageModal()">
          <i class="ti ti-settings"></i> Manage
        </button>
      </div>
    </div>

    <div id="cards-view">
      <p class="cards-title">Select a Dashboard</p>
      <p class="cards-sub" id="cards-count"></p>
      <div class="cards-grid" id="cards-grid"></div>
    </div>

    <div id="frame-view">
      <div class="frame-topbar">
        <div class="frame-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div>
        <span class="active-label" id="active-label">—</span>
        <div class="frame-url-disp" id="url-disp"></div>
        <button class="open-ext-btn" id="ext-btn" onclick="openExternal()" style="display:none;">
          <i class="ti ti-external-link"></i> Open in New Tab
        </button>
      </div>
      <div class="frame-content">
        <div class="frame-placeholder" id="placeholder">
          <div class="placeholder-ornament">◆</div>
          <p id="placeholder-name">URL Not Configured</p>
          <small>Click "Manage" above to set it</small>
          <div class="ph-hint" onclick="openManageModal()"><i class="ti ti-link"></i> Manage Dashboards</div>
        </div>
        <iframe id="main-iframe" title="Embedded Dashboard"></iframe>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="manage-modal" onclick="modalOverlayClick(event)">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-title-wrap">
          <i class="ti ti-settings"></i>
          <div>
            <div class="modal-title">Manage Dashboards</div>
            <div class="modal-subtitle">Add, rename or remove any dashboard</div>
          </div>
        </div>
        <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
      </div>
      <div class="modal-body">
        <div class="manage-labels">
          <span>Icon</span><span>Name</span><span>URL</span><span></span>
        </div>
        <div id="manage-list"></div>
        <button class="manage-add-row" onclick="addManageRow()">
          <i class="ti ti-plus"></i> Add Dashboard
        </button>
      </div>
      <div class="modal-footer">
        <span class="modal-footer-note" id="manage-count"></span>
        <div class="modal-footer-actions">
          <button class="modal-cancel" onclick="closeModal()">Cancel</button>
          <button class="modal-save" onclick="saveManage()">Save & Apply</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    // ───────────────────────────────────────────────────────────
    // YOUR FIREBASE PROJECT CONFIG LINKED SUCCESSFULLY
    // ───────────────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyAIjcgqUtBILe_M7dut9IjzuAeWbL_7y64",
      authDomain: "master-b9d9f.firebaseapp.com",
      projectId: "master-b9d9f",
      storageBucket: "master-b9d9f.firebasestorage.app",
      messagingSenderId: "43019165538",
      appId: "1:43019165538:web:87a89627a560a30dea563b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let authReady = signInAnonymously(auth).catch(function (e) {
      console.warn('Auth error:', e);
    });

    const ICONS = [
      { v: 'ti-clock', l: 'Overtime / Time' },
      { v: 'ti-building-factory', l: 'ERP / Factory' },
      { v: 'ti-clipboard-list', l: 'Orders / Checklist' },
      { v: 'ti-walk', l: 'Walk-in / Visitors' },
      { v: 'ti-chart-bar', l: 'Reports / Charts' },
      { v: 'ti-currency-rupee', l: 'Finance' },
      { v: 'ti-users', l: 'Team / HR' },
      { v: 'ti-building-estate', l: 'Property' },
      { v: 'ti-diamond', l: 'Jewellery' },
      { v: 'ti-shopping-cart', l: 'Sales / Rental' },
      { v: 'ti-database', l: 'Database' },
      { v: 'ti-briefcase', l: 'General Business' },
      { v: 'ti-layout-dashboard', l: 'Generic' }
    ];

    function defaultDashboards() {
      return [
        { id: genId(), name: 'Overtime Tracker', url: '', icon: 'ti-clock' },
        { id: genId(), name: 'ERP Tracker', url: '', icon: 'ti-building-factory' },
        { id: genId(), name: 'Order Detail Dashboard', url: '', icon: 'ti-clipboard-list' },
        { id: genId(), name: 'Walk-in Dashboard', url: '', icon: 'ti-walk' }
      ];
    }

    function genId() {
      return 'd_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
    }

    let dashboards = [];
    let activeId = null;
    let workingDashboards = [];

    // ── Theme ──
    function applyTheme(theme) {
      if (theme === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
      const icon = theme === 'light' ? 'ti ti-moon' : 'ti ti-sun';
      const mainIcon = document.getElementById('theme-icon-main');
      if (mainIcon) mainIcon.className = icon;
    }
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
      const next = current === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      try { localStorage.setItem('master-dashboard-theme', next); } catch (e) {}
    }
    (function initTheme() {
      let saved = null;
      try { saved = localStorage.getItem('master-dashboard-theme'); } catch (e) {}
      applyTheme(saved || 'dark');
    })();

    // ── Clock ──
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      const d = now.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
      document.getElementById('clock').textContent = d + '  •  ' + h + ':' + m + ':' + s;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ── Firestore: load / save ──
    async function loadDashboards() {
      try {
        await authReady;
        const snap = await getDoc(doc(db, 'config', 'dashboards'));
        if (snap.exists() && Array.isArray(snap.data().items) && snap.data().items.length) {
          dashboards = snap.data().items;
        } else {
          dashboards = defaultDashboards();
          await saveDashboards();
        }
      } catch (e) {
        console.warn('Firestore load error:', e);
        dashboards = defaultDashboards();
      }
      renderCards();
    }

    async function saveDashboards() {
      try {
        await authReady;
        await setDoc(doc(db, 'config', 'dashboards'), {
          items: dashboards,
          updatedAt: new Date().toISOString()
        });
      } catch (e) {
        console.warn('Firestore save error:', e);
        alert('Could not save to Firebase. Check your firebaseConfig and Firestore rules.');
      }
    }

    // ── Render cards ──
    function renderCards() {
      const grid = document.getElementById('cards-grid');
      grid.innerHTML = '';
      dashboards.forEach(function (dItem, idx) {
        const card = document.createElement('div');
        card.className = 'dash-card';
        card.onclick = function () { openDash(dItem.id); };
        card.innerHTML =
          '<div class="card-icon-wrap"><i class="ti ' + escapeAttr(dItem.icon || 'ti-layout-dashboard') + '"></i></div>' +
          '<div class="card-name">' + escapeHtml(dItem.name || 'Untitled') + '</div>' +
          '<div class="card-status ' + (dItem.url ? 'ready' : 'not-set') + '">' + (dItem.url ? 'Ready — Click to Open' : 'URL not configured') + '</div>' +
          '<i class="ti ti-arrow-right card-arrow"></i>';
        grid.appendChild(card);
      });
      const addCard = document.createElement('div');
      addCard.className = 'add-card';
      addCard.onclick = openManageModal;
      addCard.innerHTML = '<i class="ti ti-plus"></i><span>Add Dashboard</span>';
      grid.appendChild(addCard);

      document.getElementById('cards-count').textContent =
        dashboards.length + (dashboards.length === 1 ? ' dashboard' : ' dashboards') + ' configured';
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
    function escapeAttr(str) {
      return String(str).replace(/[^a-z0-9\-]/gi, '');
    }

    // ── Auto-load (no login required) ──
    document.getElementById('main-dash').style.display = 'flex';
    loadDashboards();

    // ── Open dashboard from card ──
    function openDash(id) {
      activeId = id;
      const item = dashboards.find(function (x) { return x.id === id; });
      if (!item) return;

      document.getElementById('cards-view').style.display = 'none';
      document.getElementById('frame-view').classList.add('visible');
      document.getElementById('back-btn').classList.add('visible');
      document.getElementById('active-label').textContent = item.name;

      const iframe = document.getElementById('main-iframe');
      const ph = document.getElementById('placeholder');
      const phName = document.getElementById('placeholder-name');
      const disp = document.getElementById('url-disp');
      const extBtn = document.getElementById('ext-btn');

      if (!item.url) {
        iframe.style.display = 'none';
        ph.style.display = 'flex';
        phName.textContent = item.name;
        disp.textContent = '';
        extBtn.style.display = 'none';
      } else {
        ph.style.display = 'none';
        iframe.style.display = 'block';
        iframe.src = item.url;
        disp.textContent = item.url;
        extBtn.style.display = 'flex';
      }
    }

    function goBack() {
      activeId = null;
      document.getElementById('cards-view').style.display = 'flex';
      document.getElementById('frame-view').classList.remove('visible');
      document.getElementById('back-btn').classList.remove('visible');
      document.getElementById('main-iframe').src = '';
    }

    function openExternal() {
      const item = dashboards.find(function (x) { return x.id === activeId; });
      if (item && item.url) window.open(item.url, '_blank');
    }

    // ── Manage modal ──
    function openManageModal() {
      workingDashboards = dashboards.map(function (x) { return Object.assign({}, x); });
      renderManageList();
      document.getElementById('manage-modal').classList.add('open');
    }
    function closeModal() {
      document.getElementById('manage-modal').classList.remove('open');
    }
    function modalOverlayClick(e) {
      if (e.target === document.getElementById('manage-modal')) closeModal();
    }

    function renderManageList() {
      const list = document.getElementById('manage-list');
      list.innerHTML = '';
      workingDashboards.forEach(function (item) {
        list.appendChild(buildManageRow(item));
      });
      document.getElementById('manage-count').textContent =
        workingDashboards.length + (workingDashboards.length === 1 ? ' dashboard' : ' dashboards');
    }

    function buildManageRow(item) {
      const row = document.createElement('div');
      row.className = 'manage-row';
      row.dataset.id = item.id;

      const select = document.createElement('select');
      ICONS.forEach(function (opt) {
        const o = document.createElement('option');
        o.value = opt.v;
        o.textContent = opt.l;
        if (opt.v === item.icon) o.selected = true;
        select.appendChild(o);
      });
      select.addEventListener('change', function () { item.icon = select.value; });

      const nameInput = document.createElement('input');
      nameInput.type = 'text';
      nameInput.placeholder = 'Dashboard name';
      nameInput.value = item.name || '';
      nameInput.addEventListener('input', function () { item.name = nameInput.value; });

      const urlInput = document.createElement('input');
      urlInput.type = 'url';
      urlInput.placeholder = 'https://... paste dashboard URL';
      urlInput.value = item.url || '';
      urlInput.addEventListener('input', function () { item.url = urlInput.value.trim(); });

      const delBtn = document.createElement('button');
      delBtn.className = 'manage-row-delete';
      delBtn.innerHTML = '<i class="ti ti-trash"></i>';
      delBtn.onclick = function () {
        workingDashboards = workingDashboards.filter(function (x) { return x.id !== item.id; });
        renderManageList();
      };

      row.appendChild(select);
      row.appendChild(nameInput);
      row.appendChild(urlInput);
      row.appendChild(delBtn);
      return row;
    }

    function addManageRow() {
      const newItem = { id: genId(), name: '', url: '', icon: 'ti-layout-dashboard' };
      workingDashboards.push(newItem);
      renderManageList();
      const rows = document.querySelectorAll('.manage-row');
      const last = rows[rows.length - 1];
      if (last) {
        last.scrollIntoView({ behavior: 'smooth', block: 'center' });
        const input = last.querySelector('input');
        if (input) input.focus();
      }
    }

    async function saveManage() {
      const saveBtn = document.querySelector('.modal-save');
      saveBtn.textContent = 'Saving...';
      saveBtn.disabled = true;

      dashboards = workingDashboards.filter(function (x) { return (x.name || '').trim() !== ''; });
      await saveDashboards();
      renderCards();

      saveBtn.textContent = 'Save & Apply';
      saveBtn.disabled = false;
      closeModal();

      if (activeId) {
        const stillExists = dashboards.find(function (x) { return x.id === activeId; });
        if (stillExists) {
          openDash(activeId);
        } else {
          goBack();
        }
      }
    }

    // Expose to global scope (called from inline onclick handlers)
    window.toggleTheme = toggleTheme;
    window.openDash = openDash;
    window.goBack = goBack;
    window.openExternal = openExternal;
    window.openManageModal = openManageModal;
    window.closeModal = closeModal;
    window.modalOverlayClick = modalOverlayClick;
    window.addManageRow = addManageRow;
    window.saveManage = saveManage;
  </script>
</body>
</html>
